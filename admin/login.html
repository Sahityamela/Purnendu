<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SAHITYA MELA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main: #8B0000; --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 380px; border: 1px solid rgba(255,255,255,0.3); }
        .logo-box img { height: 70px; margin-bottom: 10px; }
        h2 { font-family: 'Playfair Display', serif; color: var(--main); margin: 0 0 10px 0; }
        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        .form-group i.input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
        
        /* Show/Hide Password Toggle */
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa; cursor: pointer; transition: 0.3s; }
        .toggle-password:hover { color: var(--main); }

        .form-group input { width: 100%; padding: 12px 40px 12px 45px; border: 2px solid #eee; border-radius: 10px; outline: none; box-sizing: border-box; transition: 0.3s; font-size: 1rem; }
        .form-group input:focus { border-color: var(--main); }
        .login-btn { width: 100%; padding: 14px; background: var(--main); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3); transition: 0.3s; }
        .login-btn:hover { background: #6d0000; transform: translateY(-2px); }
        .login-btn:disabled { background: #ccc; cursor: not-allowed; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; display: none; z-index: 1000; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-box">
        <img src="assets/images/logo.png" alt="Logo" onerror="this.src='../assets/images/logo.png'">
    </div>
    <h2>Admin Access</h2>
    <p style="color: #666; font-size: 0.9rem;">Sahitya Mela Management Portal</p>

    <form id="loginForm">
        <div class="form-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="Admin Email" required>
        </div>

        <div class="form-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Password" required>
            <i class="fas fa-eye toggle-password" id="togglePass"></i>
        </div>

        <button type="submit" id="submitBtn" class="login-btn">Login to Dashboard</button>
    </form>
    
    <div style="margin-top: 20px; font-size: 0.8rem; color: #888;">
        <a href="index.html" style="text-decoration:none; color:var(--main); font-weight: 600;"><i class="fas fa-arrow-left"></i> Back to Site</a>
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCftWFc6WvMbaY_iwF6DUawi7Qvf0SRKYc",
        authDomain: "sahitya-mela.firebaseapp.com",
        projectId: "sahitya-mela",
        storageBucket: "sahitya-mela.firebasestorage.app",
        messagingSenderId: "283544938564",
        appId: "1:283544938564:web:b9bba32cca9e52e6aab411",
        databaseURL: "https://sahitya-mela-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Toggle Password Visibility Logic
    const togglePass = document.getElementById('togglePass');
    const passwordField = document.getElementById('password');

    togglePass.addEventListener('click', () => {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        // Toggle the icon
        togglePass.classList.toggle('fa-eye');
        togglePass.classList.toggle('fa-eye-slash');
    });

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === 'sahityamela64@gmail.com') {
            window.location.href = "dashboard.html";
        }
    });

    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = passwordField.value;

        submitBtn.disabled = true;
        submitBtn.innerText = "Checking...";

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            showToast("Success! Redirecting...", "#4CAF50");
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
        } catch (error) {
            console.error(error);
            showToast("Login Failed. Please check your credentials.", "#f44336");
            submitBtn.disabled = false;
            submitBtn.innerText = "Login to Dashboard";
        }
    });

    function showToast(msg, color) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.backgroundColor = color;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
</script>

</body>
</html>
