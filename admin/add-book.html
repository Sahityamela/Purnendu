<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - Sahitya Mela Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #8B0000; --bg: #f4f4f4; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .admin-nav { background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 850px; margin: auto; }
        .form-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        label { font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .preview-box { margin-top: 10px; width: 110px; height: 150px; border: 2px dashed #bbb; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; background: #fff; overflow: hidden; }
        .preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .rem-btn { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 10px; border: 1px dashed #ccc; padding: 10px; border-radius: 8px; }
        .g-item { position: relative; height: 90px; border: 1px solid #ddd; border-radius: 5px; overflow: hidden; }
        .g-item img { width: 100%; height: 100%; object-fit: cover; }
        #pdfPrev { width: 100%; height: 200px; display: none; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .prog-box { width: 100%; background: #eee; height: 35px; border-radius: 8px; margin: 20px 0; display: none; overflow: hidden; }
        .bar { width: 0%; height: 100%; background: #28a745; color: white; text-align: center; line-height: 35px; font-weight: bold; transition: 0.3s; }
        #saveBtn { width: 100%; padding: 18px; background: var(--main); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<header class="admin-nav">
    <a href="manage-books.html" style="text-decoration:none; color:#444; font-weight:bold;"><i class="fas fa-arrow-left"></i> Back</a>
    <h3 style="margin:0; color:var(--main);">Add New Book</h3>
</header>
<div class="container">
    <div class="form-card">
        <div class="grid">
            <div><label>Book Title *</label><input type="text" id="title" required></div>
            <div><label>Author *</label><input type="text" id="author" required></div>
        </div>
        <div class="grid">
            <div><label>Category</label><select id="cat"><option>General</option><option>Poetry</option><option>Novel</option><option>Essay</option></select></div>
            <div><label>Language</label><input type="text" id="lang" value="Bengali"></div>
        </div>
        <div class="grid">
            <div><label>Publication Date</label><input type="date" id="pubDate"></div>
            <div><label>ISBN</label><input type="text" id="isbn"></div>
        </div>
        <div class="grid">
            <div><label>Pages</label><input type="number" id="pages"></div>
            <div><label>Price (৳)</label><input type="text" id="price"></div>
        </div>
        <div class="form-group"><label>Publisher</label><input type="text" id="pub"></div>
        <div class="form-group" style="margin-top:10px;"><label>Description</label><textarea id="desc" rows="3"></textarea></div>
        <hr style="margin:25px 0; border:0; border-top:1px solid #eee;">
        <div class="grid">
            <div>
                <label>Cover Image *</label>
                <input type="file" id="cIn" accept="image/*" onchange="preC(this)">
                <div class="preview-box">
                    <button class="rem-btn" id="rC" style="display:none" onclick="delC()">×</button>
                    <img id="pC"><span id="pT" style="color:#999; font-size:0.8rem;">No Image</span>
                </div>
            </div>
            <div>
                <label>PDF File <button onclick="delP()" id="pDelBtn" style="display:none; color:red; border:none; background:none; cursor:pointer;">(Clear)</button></label>
                <input type="file" id="pIn" accept=".pdf" onchange="preP(this)"><iframe id="pdfPrev"></iframe>
            </div>
        </div>
        <label style="margin-top:25px;">Gallery Photos (Add multiple)</label>
        <input type="file" accept="image/*" onchange="appG(this)">
        <div id="gArea" class="gallery-grid"></div>
        <div class="prog-box" id="pB"><div class="bar" id="pBar">0%</div></div>
        <button id="saveBtn">Upload and Add Book</button>
    </div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const fb = initializeApp({ apiKey: "AIzaSyCftWFc6WvMbaY_iwF6DUawi7Qvf0SRKYc", databaseURL: "https://sahitya-mela-default-rtdb.firebaseio.com", projectId: "sahitya-mela" });
    const db = getDatabase(fb);
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzdDsLPr7F-6gwkKzdJLNgCUZPIWIryVdKqrdnrtDX4DOK7hkLlhnXxcBjvEMH69d3r/exec";

    let galFiles = [];
    window.preC = (i) => { if(i.files[0]) { document.getElementById('pC').src = URL.createObjectURL(i.files[0]); document.getElementById('rC').style.display='flex'; document.getElementById('pT').style.display='none'; }};
    window.delC = () => { document.getElementById('cIn').value=""; document.getElementById('pC').src=""; document.getElementById('rC').style.display='none'; document.getElementById('pT').style.display='block'; };
    window.preP = (i) => { if(i.files[0]) { document.getElementById('pdfPrev').src = URL.createObjectURL(i.files[0]); document.getElementById('pdfPrev').style.display='block'; document.getElementById('pDelBtn').style.display='inline'; }};
    window.delP = () => { document.getElementById('pIn').value=""; document.getElementById('pdfPrev').src=""; document.getElementById('pdfPrev').style.display='none'; document.getElementById('pDelBtn').style.display='none'; };
    window.appG = (i) => { if(i.files[0]) { galFiles.push(i.files[0]); renderG(); i.value=""; }};
    window.remG = (idx) => { galFiles.splice(idx, 1); renderG(); };
    function renderG() { const a = document.getElementById('gArea'); a.innerHTML=""; galFiles.forEach((f, i) => { a.innerHTML += `<div class="g-item"><img src="${URL.createObjectURL(f)}"><button class="rem-btn" onclick="remG(${i})">×</button></div>`; }); }

    async function upload(file) {
        return new Promise((res) => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = async () => {
                const rep = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ base64: r.result.split(',')[1], type: file.type, name: file.name }) });
                const d = await rep.json(); res(d.id);
            };
        });
    }

    document.getElementById('saveBtn').onclick = async () => {
        const title = document.getElementById('title').value;
        const cF = document.getElementById('cIn').files[0];
        if(!title || !cF) return alert("Title and Cover required");
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('pB').style.display='block';
        const bar = document.getElementById('pBar');
        try {
            bar.style.width="20%"; bar.innerText="Cover...";
            const cid = await upload(cF);
            let book = { title, author: document.getElementById('author').value, category: document.getElementById('cat').value, language: document.getElementById('lang').value, pubDate: document.getElementById('pubDate').value, isbn: document.getElementById('isbn').value, pages: document.getElementById('pages').value, price: document.getElementById('price').value, publisher: document.getElementById('pub').value, description: document.getElementById('desc').value, coverUrl: cid, gallery: [] };
            const pF = document.getElementById('pIn').files[0];
            if(pF) { bar.style.width="50%"; bar.innerText="PDF..."; book.pdfUrl = "https://drive.google.com/file/d/"+(await upload(pF))+"/preview"; }
            for(let i=0; i<galFiles.length; i++) {
                bar.style.width = (60+i) + "%"; bar.innerText = "Photo "+(i+1);
                book.gallery.push(await upload(galFiles[i]));
            }
            await set(push(ref(db, 'books')), book);
            alert("✅ Added Successfully!"); location.reload();
        } catch(e) { alert("Error! Check script and rules."); document.getElementById('saveBtn').disabled = false; }
    };
</script>
</body>
</html>
