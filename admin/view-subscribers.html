<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribers - Sahitya Mela Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #8B0000; --bg: #f4f7f6; --sidebar: #1a1a1a; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; color: #333; }

        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; left: 0; top: 0; color: white; z-index: 2000; }
        .sidebar-brand { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; color: var(--main); font-size: 1.2rem; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 15px 25px; color: #bbb; text-decoration: none; transition: 0.3s; width: 100%; border: none; background: none; text-align: left; font-size: 1rem; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: var(--main); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; margin-left: 260px; min-height: 100vh; width: 100%; }
        .admin-header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .container { padding: 30px; max-width: 1000px; margin: auto; }

        .page-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .copy-btn { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .copy-btn:hover { background: #000; }

        /* --- TABLE STYLE --- */
        .sub-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #777; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        
        .delete-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .delete-btn:hover { color: black; transform: scale(1.2); }

        @media (max-width: 768px) {
            .sidebar { left: -260px; }
            .main-content { margin-left: 0; }
            .container { padding: 15px; }
            .page-title-row { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">সাহিত্য মেলা Admin</div>
    <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
    <a href="manage-books.html" class="nav-link"><i class="fas fa-tasks"></i> <span>Manage Library</span></a>
    <a href="view-subscribers.html" class="nav-link active"><i class="fas fa-users"></i> <span>Subscribers</span></a>
    <a href="../index.html" class="nav-link"><i class="fas fa-external-link-alt"></i> <span>Live Website</span></a>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px;">
    <button onclick="logoutUser()" class="nav-link" style="color:#ff4d4d;"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></button>
</aside>

<main class="main-content">
    <header class="admin-header">
        <h2 style="margin:0;">Newsletter List</h2>
        <div id="adminMail" style="font-weight:bold; color:var(--main);">Admin</div>
    </header>

    <div class="container">
        <div class="page-title-row">
            <div>
                <h1 style="margin:0;">Reader Subscriptions</h1>
                <p style="color:#666; margin:5px 0 0;">Manage your literary community</p>
            </div>
            <button class="copy-btn" id="copyEmails"><i class="fas fa-copy"></i> Copy All Emails</button>
        </div>

        <div class="sub-card">
            <table>
                <thead>
                    <tr>
                        <th>Email Address</th>
                        <th>Date Joined</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody id="subList">
                    <tr><td colspan="3" style="text-align:center; padding:40px;">Fetching subscribers...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCftWFc6WvMbaY_iwF6DUawi7Qvf0SRKYc",
        authDomain: "sahitya-mela.firebaseapp.com",
        projectId: "sahitya-mela",
        databaseURL: "https://sahitya-mela-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else document.getElementById('adminMail').innerText = user.email;
    });

    window.logoutUser = () => { if(confirm("Log out?")) signOut(auth).then(() => location.href="login.html"); };

    // FETCH SUBSCRIBERS
    onValue(ref(db, 'subscribers'), (snapshot) => {
        const list = document.getElementById('subList');
        list.innerHTML = '';
        let allEmails = [];

        if (snapshot.exists()) {
            const data = snapshot.val();
            Object.keys(data).reverse().forEach(id => {
                const s = data[id];
                allEmails.push(s.email);
                const date = new Date(s.date).toLocaleDateString('en-GB');
                
                const row = `
                    <tr>
                        <td><b>${s.email}</b></td>
                        <td>${date}</td>
                        <td style="text-align: right;">
                            <button class="delete-btn" onclick="deleteSub('${id}')"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
                list.innerHTML += row;
            });

            // Copy Functionality
            document.getElementById('copyEmails').onclick = () => {
                navigator.clipboard.writeText(allEmails.join(', '));
                alert("All emails copied to clipboard! You can now paste them into your Gmail 'BCC' field.");
            };

        } else {
            list.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:40px;">No subscribers yet.</td></tr>';
        }
    });

    // DELETE SUBSCRIBER
    window.deleteSub = (id) => {
        if(confirm("Remove this email from the list?")) {
            remove(ref(db, `subscribers/${id}`));
        }
    };
</script>
</body>
</html>
