<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahitya Mela - Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #8B0000; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }

        /* Navbar */
        .nav-bar { background: white; padding: 12px 20px; display: flex; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .back-btn { background: var(--main); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-btn:hover { background: #600000; }
        .nav-title { margin-left: 20px; font-weight: bold; color: var(--main); font-size: 1.1rem; flex: 1; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        /* Book Info */
        .book-hero { display: flex; gap: 25px; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .main-cover { width: 180px; height: 260px; border-radius: 10px; object-fit: cover; border: 1px solid #ddd; }
        .book-details { flex: 1; }
        .book-details h1 { margin: 0; font-size: 1.8rem; color: #1a1a1a; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }
        .stat-box { background: #fafafa; border: 1px solid #eee; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-box small { display: block; color: #888; font-size: 0.7rem; }
        .stat-box span { font-weight: bold; color: #333; font-size: 0.9rem; }

        /* Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-item { width: 100%; height: 220px; border-radius: 10px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; background: white; transition: 0.3s; }
        .gallery-item:hover { transform: translateY(-5px); }

        iframe { width: 100%; height: 650px; border: none; border-radius: 12px; background: #eee; }

        /* --- FIXED IMAGE MODAL (X MARK FIXED) --- */
        #imgModal {
            display: none; 
            position: fixed; 
            z-index: 5000; /* Higher than everything */
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            padding: 20px;
            box-sizing: border-box;
        }

        /* THE FIX FOR THE CROSS MARK (X) */
        .close-modal {
            position: absolute;
            top: 25px; 
            right: 25px;
            background: var(--main); /* Dark red background */
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%; /* Perfect circle */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            z-index: 6000;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 2px solid white;
            transition: 0.3s;
        }
        .close-modal:hover { transform: scale(1.1); background: #ff0000; }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 95%;
            max-height: 85vh;
            border-radius: 10px;
            margin-top: 40px; /* Space for the button */
        }

        @media (max-width: 600px) {
            .book-hero { flex-direction: column; align-items: center; text-align: center; }
            iframe { height: 450px; }
            .gallery-grid { grid-template-columns: 1fr 1fr; }
            .close-modal { top: 15px; right: 15px; width: 40px; height: 40px; font-size: 22px; }
        }
    </style>
</head>
<body>

<div id="imgModal" onclick="if(event.target == this) closeFullImg()">
    <span class="close-modal" onclick="closeFullImg()">&times;</span>
    <img class="modal-content" id="fullImg">
    <div style="text-align:center; color:white; margin-top:15px; font-weight:bold; letter-spacing:1px;" id="caption">PAGE PREVIEW</div>
</div>

<nav class="nav-bar">
    <a href="library.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <div class="nav-title" id="navTitle">Sahitya Mela</div>
</nav>

<div class="container">
    <div class="book-hero">
        <img id="mainCover" src="" class="main-cover">
        <div class="book-details">
            <h1 id="title">Loading...</h1>
            <div style="color:var(--main); font-weight:bold; margin-top:5px;" id="author"></div>
            <div class="stats-grid">
                <div class="stat-box"><small>ISBN</small><span id="isbn">...</span></div>
                <div class="stat-box"><small>Price</small><span id="price">...</span></div>
                <div class="stat-box"><small>Date</small><span id="date">...</span></div>
                <div class="stat-box"><small>Category</small><span id="cat">...</span></div>
            </div>
        </div>
    </div>

    <div id="pdfSection" style="display:none;">
        <h2 style="color:var(--main); border-bottom:2px solid #eee; padding-bottom:10px;">Read Online</h2>
        <iframe id="pdfIframe" src=""></iframe>
    </div>

    <div id="galSection" style="display:none; margin-top:40px;">
        <h2 style="color:var(--main); border-bottom:2px solid #eee; padding-bottom:10px;">Book Gallery</h2>
        <div class="gallery-grid" id="galGrid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const fb = initializeApp({ 
        apiKey: "AIzaSyCftWFc6WvMbaY_iwF6DUawi7Qvf0SRKYc", 
        databaseURL: "https://sahitya-mela-default-rtdb.firebaseio.com", 
        projectId: "sahitya-mela" 
    });
    const db = getDatabase(fb);
    const bookId = new URLSearchParams(window.location.search).get('id');

    function cleanId(u) {
        if (!u) return "";
        let id = u.includes('id=') ? u.split('id=')[1].split('&')[0] : (u.includes('/d/')) ? u.split('/d/')[1].split('/')[0] : u;
        return id.toString().replace(/[{}]/g, '').trim();
    }

    // Modal Functions
    window.openFullImg = (url) => {
        document.getElementById('fullImg').src = url;
        document.getElementById('imgModal').style.display = "block";
        document.body.style.overflow = "hidden"; // Stop background scroll
    };
    window.closeFullImg = () => {
        document.getElementById('imgModal').style.display = "none";
        document.body.style.overflow = "auto"; // Re-enable scroll
    };

    if (bookId) {
        get(ref(db, 'books/' + bookId)).then((s) => {
            if (s.exists()) {
                const b = s.val();
                document.getElementById('navTitle').innerText = b.title;
                document.getElementById('title').innerText = b.title;
                document.getElementById('author').innerText = "By " + (b.author || "Unknown");
                document.getElementById('isbn').innerText = b.isbn || "N/A";
                document.getElementById('price').innerText = b.price ? "৳" + b.price : "Free";
                document.getElementById('date').innerText = b.pubDate || "N/A";
                document.getElementById('cat').innerText = b.category || "General";
                
                const coverId = cleanId(b.coverUrl);
                document.getElementById('mainCover').src = `https://drive.google.com/thumbnail?id=${coverId}&sz=w600`;

                if (b.pdfUrl) {
                    document.getElementById('pdfSection').style.display = 'block';
                    document.getElementById('pdfIframe').src = b.pdfUrl;
                }

                if (b.gallery && Array.isArray(b.gallery)) {
                    document.getElementById('galSection').style.display = 'block';
                    const grid = document.getElementById('galGrid');
                    b.gallery.forEach(url => {
                        const id = cleanId(url);
                        const img = document.createElement('img');
                        const thumbnail = `https://drive.google.com/thumbnail?id=${id}&sz=w400`;
                        const fullSize = `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
                        
                        img.src = thumbnail;
                        img.className = 'gallery-item';
                        img.onclick = () => openFullImg(fullSize);
                        grid.appendChild(img);
                    });
                }
            }
        });
    }
</script>
</body>
</html>
