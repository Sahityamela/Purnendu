<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahitya Mela - Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #8B0000; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }

        /* Navbar with Back Button */
        .nav-bar { background: white; padding: 12px 20px; display: flex; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .back-btn { background: var(--main); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-btn:hover { background: #600000; transform: scale(1.05); }
        .nav-title { margin-left: 20px; font-weight: bold; color: var(--main); font-size: 1.1rem; flex: 1; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        /* Book Info */
        .book-hero { display: flex; gap: 25px; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .main-cover { width: 180px; height: 260px; border-radius: 10px; object-fit: cover; border: 1px solid #ddd; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .book-details { flex: 1; }
        .book-details h1 { margin: 0; font-size: 1.8rem; color: #1a1a1a; }
        .author-tag { color: var(--main); font-size: 1.1rem; margin: 5px 0; font-weight: 500; }
        
        /* Info Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }
        .stat-box { background: #fafafa; border: 1px solid #eee; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-box small { display: block; color: #888; font-size: 0.7rem; margin-bottom: 3px; }
        .stat-box span { font-weight: bold; color: #333; font-size: 0.9rem; }

        .section-header { margin: 35px 0 15px 0; padding-bottom: 10px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .section-header h2 { margin: 0; font-size: 1.3rem; color: var(--main); display: flex; align-items: center; gap: 10px; }
        
        .description { font-size: 1rem; line-height: 1.7; color: #555; background: white; padding: 20px; border-radius: 12px; }

        /* Gallery - FULL SIZE REDIRECT */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-item { width: 100%; height: 220px; border-radius: 10px; object-fit: cover; cursor: pointer; transition: 0.3s; border: 1px solid #ddd; background: white; }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(139,0,0,0.2); }

        /* Reader */
        iframe { width: 100%; height: 650px; border: none; border-radius: 12px; background: #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        @media (max-width: 600px) {
            .book-hero { flex-direction: column; align-items: center; text-align: center; }
            iframe { height: 450px; }
            .gallery-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <div class="nav-title" id="navTitle">Sahitya Mela</div>
</nav>

<div class="container">
    <div class="book-hero">
        <img id="mainCover" src="" class="main-cover">
        <div class="book-details">
            <h1 id="title">Loading...</h1>
            <div class="author-tag" id="author"></div>
            <div class="stats-grid" id="statsArea">
                <div class="stat-box"><small>Category</small><span id="cat">...</span></div>
                <div class="stat-box"><small>ISBN</small><span id="isbn">...</span></div>
                <div class="stat-box"><small>Price</small><span id="price">...</span></div>
                <div class="stat-box"><small>Pages</small><span id="pages">...</span></div>
                <div class="stat-box"><small>Date</small><span id="date">...</span></div>
            </div>
        </div>
    </div>

    <div class="section-header"><h2><i class="fas fa-align-left"></i> Summary</h2></div>
    <div class="description" id="description">...</div>

    <div id="pdfSection" style="display:none;">
        <div class="section-header">
            <h2><i class="fas fa-book-open"></i> Read Online</h2>
            <a id="dlBtn" href="#" style="color:var(--main); text-decoration:none; font-weight:bold;"><i class="fas fa-download"></i> Download</a>
        </div>
        <iframe id="pdfIframe" src=""></iframe>
    </div>

    <div id="galSection" style="display:none;">
        <div class="section-header"><h2><i class="fas fa-images"></i> Book Gallery</h2></div>
        <p style="font-size:0.8rem; color:#888;">Click any image to view in full resolution (New Tab)</p>
        <div class="gallery-grid" id="galGrid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const fb = initializeApp({ 
        apiKey: "AIzaSyCftWFc6WvMbaY_iwF6DUawi7Qvf0SRKYc", 
        databaseURL: "https://sahitya-mela-default-rtdb.firebaseio.com", 
        projectId: "sahitya-mela" 
    });
    const db = getDatabase(fb);
    const bookId = new URLSearchParams(window.location.search).get('id');

    // Link cleaner function
    function cleanId(u) {
        if (!u) return "";
        let id = u.includes('id=') ? u.split('id=')[1].split('&')[0] : (u.includes('/d/') ? u.split('/d/')[1].split('/')[0] : u);
        return id.toString().replace(/[{}]/g, '').trim();
    }

    if (bookId) {
        get(ref(db, 'books/' + bookId)).then((s) => {
            if (s.exists()) {
                const book = s.val();
                document.getElementById('navTitle').innerText = book.title;
                document.getElementById('title').innerText = book.title;
                document.getElementById('author').innerText = "By " + (book.author || "Unknown");
                document.getElementById('description').innerText = book.description || "No description provided.";
                document.getElementById('cat').innerText = book.category || "General";
                document.getElementById('isbn').innerText = book.isbn || "N/A";
                document.getElementById('price').innerText = book.price ? "৳" + book.price : "N/A";
                document.getElementById('pages').innerText = book.pages || "N/A";
                document.getElementById('date').innerText = book.pubDate || "N/A";
                
                // Set Thumbnail
                const coverId = cleanId(book.coverUrl);
                document.getElementById('mainCover').src = `https://lh3.googleusercontent.com/d/${coverId}`;

                if (book.pdfUrl) {
                    document.getElementById('pdfSection').style.display = 'block';
                    document.getElementById('pdfIframe').src = book.pdfUrl;
                    document.getElementById('dlBtn').href = `https://drive.google.com/uc?export=download&id=${cleanId(book.pdfUrl)}`;
                }

                if (book.gallery && Array.isArray(book.gallery)) {
                    document.getElementById('galSection').style.display = 'block';
                    const grid = document.getElementById('galGrid');
                    book.gallery.forEach(rawUrl => {
                        const fileId = cleanId(rawUrl);
                        const img = document.createElement('img');
                        // Thumbnail
                        img.src = `https://lh3.googleusercontent.com/d/${fileId}`;
                        img.className = 'gallery-item';
                        
                        // FULL VIEW ON CLICK (Redirect to new tab)
                        img.onclick = () => {
                            // This link opens the full high-res image directly in a new tab
                            const fullViewUrl = `https://lh3.googleusercontent.com/d/${fileId}`;
                            window.open(fullViewUrl, '_blank');
                        };
                        grid.appendChild(img);
                    });
                }
            }
        });
    }
</script>
</body>
</html>
